# Nginx config for serving a Single-Page Application (React/Vite build).
#
# Designed for the official nginx:alpine image.  Cloud Run injects PORT=8080
# via the CMD wrapper in each frontend Dockerfile — this file uses that port.

server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Cloud Run / load-balancer health probe.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Static assets emitted by Vite have content-hash filenames; cache them
    # aggressively so repeated visits are instant.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other requests — including client-side routes — fall back to
    # index.html so React Router handles the navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
